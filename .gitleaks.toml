# Gitleaks configuration for cloud-sandbox
# Docs: https://github.com/gitleaks/gitleaks?tab=readme-ov-file#configuration
#
# Run manually:   gitleaks protect --staged --redact
# Run on tree:    gitleaks detect --source . --redact
# Pre-commit:     configured via .husky/pre-commit
#
# TruffleHog companion scan (excludes build artifacts):
#   trufflehog filesystem . --no-update \
#     --exclude-paths=<(printf 'submodules/\npublic/\nstatic/\n.cache/\nnode_modules/\ncontent/\npnpm-lock.yaml\n')

title = "cloud-sandbox gitleaks config"

[extend]
# Extend the default ruleset shipped with gitleaks
useDefault = true

# ── Allowlist: paths to exclude from scanning ────────────────────────────────
[allowlist]
description = "Exclude generated files, submodule histories, and known-safe paths"

# Exclude lock files (contain content hashes, not secrets)
paths = [
  "pnpm-lock.yaml",
  "package-lock.json",
  # Gatsby site config — contains only search.usa.gov / DAP public API keys
  "gatsby-config.js",
  # Submodules have their own git histories; scan them separately
  "submodules/",
  # Public static assets
  "public/",
  "static/",
  # Gatsby build cache — generated binary/JS bundles, not source files
  ".cache/",
  # OSCAL JSON schemas contain UUID patterns that trigger Privacy false positives
  "content/",
]

# ── Allowlist: commits already in history ────────────────────────────────────
# These commits contain the search.usa.gov access_key from the original
# Federalist USWDS Gatsby template in README.md. The key is a public
# search.gov affiliate key (not a cloud credential) and cannot be rewritten.
commits = [
  "dc8313c2fd33095a19bfb513f5224b6dc0306f7a",
  "29271393afe103b72e0645e6eb102cf42d668e21",
  "276f5f8cda5a33cad73bfcf163cd9303a6359719",
]

# ── Allowlist: regexes for patterns that are false positives ─────────────────
# These are intentional example/placeholder values in .env.example files.
regexes = [
  # Standard AWS documentation example key
  "AKIAIOSFODNN7EXAMPLE",
  # Standard AWS documentation example secret
  "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY",
  # Placeholder VPC ID used in env examples
  "vpc-XXXXXXXX",
  # Azure .env.example placeholder UUIDs
  "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
  # GCP/Azure .env.example placeholder credential values
  "CHANGEME-sp-secret",
  "CHANGEME-strong-password",
]

# ── Custom rules: GCP credentials ────────────────────────────────────────────

[[rules]]
id          = "gcp-service-account-json"
description = "GCP service account JSON key (inline or file)"
regex       = '''(?i)(GOOGLE_CREDENTIALS|GOOGLE_APPLICATION_CREDENTIALS)\s*[=:]\s*['\"]?\{[^}]*"type"\s*:\s*"service_account"'''
secretGroup = 1
tags        = ["gcp", "service-account", "key"]
  [rules.allowlist]
  # .env.example files intentionally contain placeholder SA JSON structures
  paths = ["scripts/envs/gcp.env.example"]
  regexes = ["YOUR_PROJECT_ID"]
[[rules]]
id          = "gcp-service-account-private-key"
description = "GCP service account private_key field inside a JSON blob"
regex       = '''"private_key"\s*:\s*"-----BEGIN [A-Z ]+ KEY-----'''
tags        = ["gcp", "service-account", "private-key"]

  [rules.allowlist]
  # .env.example files contain a placeholder \n... stub, not a real key
  paths   = ["scripts/envs/gcp.env.example"]
  regexes = ['''-----BEGIN RSA PRIVATE KEY-----\\n\.\.\.''']

[[rules]]
id          = "gcp-api-key"
description = "GCP API key (AIza prefix, 39 chars)"
regex       = '''AIza[0-9A-Za-z\-_]{35}'''
tags        = ["gcp", "api-key"]

  [rules.allowlist]
  # GCP API keys from docs examples
  regexes = ["AIzaSyEXAMPLE"]

[[rules]]
id          = "gcp-oauth-client-secret"
description = "GCP OAuth 2.0 client secret"
regex       = '''GOCSPX-[0-9A-Za-z\-_]{28}'''
tags        = ["gcp", "oauth"]

# ── Custom rules: Azure credentials ──────────────────────────────────────────

[[rules]]
id          = "azure-arm-client-secret"
description = "Azure ARM_CLIENT_SECRET in env file or shell export"
regex       = '''(?i)(ARM_CLIENT_SECRET|AZURE_CLIENT_SECRET)\s*[=:]\s*['"]?([A-Za-z0-9~._\-]{30,})['"]?'''
secretGroup = 2
tags        = ["azure", "service-principal"]

  [rules.allowlist]
  regexes = ["CHANGEME-sp-secret"]

[[rules]]
id          = "azure-storage-connection-string"
description = "Azure Storage account connection string"
regex       = '''DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/]{86}=='''
tags        = ["azure", "storage", "connection-string"]

[[rules]]
id          = "azure-storage-account-key"
description = "Azure Storage account key (Base64, 88 chars ending ==)"
regex       = '''(?i)(AZURE_STORAGE_KEY|STORAGE_ACCOUNT_KEY|AccountKey)\s*[=:]\s*['"]?([A-Za-z0-9+/]{86}==)['"]?'''
secretGroup = 2
tags        = ["azure", "storage"]

[[rules]]
id          = "azure-sas-token"
description = "Azure Shared Access Signature token"
regex       = '''sv=20\d{2}-\d{2}-\d{2}&s[a-z]=&[a-z]+=[^&\s'"]{10,}&sig=[A-Za-z0-9+/%]{40,}'''
tags        = ["azure", "sas-token"]

[[rules]]
id          = "azure-eventhubs-connection-string"
description = "Azure Event Hubs / Service Bus connection string"
regex       = '''Endpoint=sb://[^.]+\.servicebus\.windows\.net/[^;]*;SharedAccessKeyName=[^;]+;SharedAccessKey=[A-Za-z0-9+/=]{44}'''
tags        = ["azure", "eventhubs", "servicebus"]

# ── Custom rules: Cloud Foundry / CSB broker credentials ─────────────────────

[[rules]]
id          = "cf-broker-password"
description = "CSB broker SECURITY_USER_PASSWORD set to a real (non-example) value"
regex       = '''(?i)SECURITY_USER_PASSWORD\s*[=:]\s*['"]?([A-Za-z0-9!@#$%^&*()\-_+=]{16,})['"]?'''
secretGroup = 1
tags        = ["cf", "broker", "password"]

  [rules.allowlist]
  regexes = ["CHANGEME-strong-password", "REPLACE_WITH_STRONG_PASSWORD"]
