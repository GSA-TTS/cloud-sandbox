# .github/workflows/sync-to-gitlab.yml
#
# Notify the GitLab production deployment repo whenever a PR is merged to main.
#
# ARCHITECTURE
# ─────────────────────────────────────────────────────────────────────────────
# This GitHub repo is the PUBLIC reference / documentation repo.
# The GitLab repo is a MIRROR used for production deployments.
#
# When someone merges to main here, this workflow fires the GitLab pipeline
# trigger so the GitLab runner picks up the latest submodule pointers and
# re-deploys only the brokerpaks / Prowler whose files changed.
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions)
# ─────────────────────────────────────────────────────────────────────────────
#   GITLAB_PROJECT_ID             numeric project id (Settings → General in GitLab)
#   GITLAB_PIPELINE_TRIGGER_TOKEN pipeline trigger token (Settings → CI/CD → Pipeline triggers)
#   GITLAB_API_URL                https://gitlab.com (or your self-hosted URL)
#
# OPTIONAL
#   GITLAB_REF                    defaults to "main"; set to override target branch
# ─────────────────────────────────────────────────────────────────────────────

name: Notify GitLab — Trigger Production Pipeline

on:
  push:
    branches:
      - main
  # Allow manual dispatch for testing
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual dispatch"

jobs:
  trigger-gitlab-pipeline:
    name: Trigger GitLab deployment pipeline
    runs-on: ubuntu-latest
    # Only run if the secrets are configured — avoids noisy failures on forks
    if: ${{ secrets.GITLAB_PIPELINE_TRIGGER_TOKEN != '' }}

    steps:
      - name: Collect submodule version context
        id: versions
        run: |
          echo "github_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ inputs.reason || github.event.head_commit.message }}" >> "$GITHUB_OUTPUT"

      - name: Trigger GitLab pipeline
        env:
          GITLAB_API_URL: ${{ secrets.GITLAB_API_URL || 'https://gitlab.com' }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          TRIGGER_TOKEN: ${{ secrets.GITLAB_PIPELINE_TRIGGER_TOKEN }}
          GITLAB_REF: ${{ secrets.GITLAB_REF || 'main' }}
        run: |
          echo "Triggering GitLab pipeline for ref: ${GITLAB_REF}"
          HTTP_STATUS=$(curl --silent --output /tmp/gl-response.json --write-out "%{http_code}" \
            --request POST \
            --form "token=${TRIGGER_TOKEN}" \
            --form "ref=${GITLAB_REF}" \
            --form "variables[GITHUB_SHA]=${GITHUB_SHA}" \
            --form "variables[TRIGGERED_BY]=github-push" \
            --form "variables[GITHUB_ACTOR]=${GITHUB_ACTOR}" \
            "${GITLAB_API_URL}/api/v4/projects/${GITLAB_PROJECT_ID}/trigger/pipeline")

          echo "Response HTTP status: ${HTTP_STATUS}"
          cat /tmp/gl-response.json

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "ERROR: GitLab pipeline trigger failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          PIPELINE_URL=$(python3 -c "
          import json, sys
          d = json.load(open('/tmp/gl-response.json'))
          print(d.get('web_url', 'URL not in response'))
          " 2>/dev/null || echo "See GitLab for pipeline URL")

          echo "GitLab pipeline triggered: ${PIPELINE_URL}"
          echo "pipeline_url=${PIPELINE_URL}" >> "$GITHUB_OUTPUT"

      - name: Post pipeline link as commit status
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state: 'pending',
              target_url: '${{ steps.trigger-gitlab-pipeline.outputs.pipeline_url }}',
              description: 'GitLab deployment pipeline triggered',
              context: 'gitlab/deployment',
            });
